<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KT PING - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 🎥 VIDEO NỀN ĐẰNG SAU (Dùng tệp tải lên trực tiếp) */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: blur(12px) brightness(0.6); 
            transform: scale(1.1); 
        }

        /* Khóa bao phủ toàn màn hình */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95); 
            border: 2px solid #ff4d4d;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(255, 77, 77, 0.3);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* 🔴 VIỀN LED ĐỎ - TRẮNG CHẠY XUNG QUANH AVATAR */
        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 5px;
        }

        .avatar-wrapper::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(#ff4d4d, #ffffff, #ff4d4d, #ffffff);
            animation: rotateLed 3s linear infinite;
            z-index: 1;
        }

        .avatar-container {
            position: relative;
            z-index: 2;
            width: 100px;
            height: 100px;
            background: #ffffff;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* Ảnh đại diện (Đã đổi sang tệp avatar.jpg) */
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes rotateLed {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: #ff4d4d;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(255, 77, 77, 0.1);
        }

        .subtitle {
            color: rgba(0, 0, 0, 0.4);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            outline: none;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        input[type="text"]:focus {
            border-color: #ff4d4d;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #ff4d4d;
            color: #ffffff;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 77, 77, 0.3);
        }

        .btn-login:hover {
            background: #e03b3b;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            color: #888;
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e0e0e0;
            margin: 0 10px;
        }

        .btn-getkey {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #ff4d4d;
            border: 2px solid #ff4d4d;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-getkey:hover {
            background: rgba(255, 77, 77, 0.05);
        }

        .server-status {
            margin-top: 25px;
            display: inline-block;
            padding: 6px 16px;
            background: #e6f7ed;
            color: #2e7d32;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #2e7d32;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.35);
            font-weight: 600;
        }

        /* Màn hình Game/App sau khi mở khóa thành công */
        #success-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100000;
            position: relative;
            color: white;
        }

        #success-screen h2 {
            font-size: 48px;
            color: #2e7d32;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(46, 125, 50, 0.5);
        }
    </style>
</head>
<body>

    <video class="video-background" autoplay muted loop playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>

    <div id="lock-screen">
        <div class="container">
            <div class="avatar-wrapper">
                <div class="avatar-container">
                    <img src="avatar.jpg" alt="Avatar">
                </div>
            </div>
            
            <h1>KT PING ⚡</h1>
            <div class="subtitle">Premium Ping ⚡</div>

            <div class="input-group">
                <input type="text" id="key-input" placeholder="Nhập Key của bạn">
            </div>

            <button class="btn-login" onclick="verifyKey()">ĐĂNG NHẬP</button>

            <div class="divider">HOẶC</div>

            <a class="btn-getkey" href="https://link4m.org/oBqJiuC" target="_blank">LẤY KEY MIỄN PHÍ</a>

            <br>
            <div class="server-status">
                <span class="status-dot"></span>SERVER ONLINE
            </div>

            <div class="footer-info">
                <span>yamete</span>
                <span>á á I cư i cư</span>
            </div>
        </div>
    </div>

    <div id="success-screen">
        <h2>DONE!</h2>
        <p style="color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Hệ thống đã kích hoạt thành công.</p>
    </div>

    <script>
        const EXPIRE_TIME = 5 * 60 * 60 * 1000; 

        function getDeviceID() {
            let devId = localStorage.getItem("device_id");
            if (!devId) {
                devId = 'DEV' + Math.random().toString(36).substring(2, 8).toUpperCase();
                localStorage.setItem("device_id", devId);
            }
            return devId;
        }

        function generateDeviceKey() {
            const devId = getDeviceID();
            const today = new Date();
            const dateStr = today.getFullYear() + "" + (today.getMonth() + 1) + "" + today.getDate();
            const seed = devId + "_" + dateStr;
            
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = (hash << 5) - hash + seed.charCodeAt(i);
                hash |= 0;
            }
            const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
            let result = "";
            let absHash = Math.abs(hash);
            for (let i = 0; i < 9; i++) {
                absHash = (absHash * 16807) % 2147483647;
                result += chars[absHash % chars.length];
            }
            return `kietlac_${result}`;
        }

        window.onload = function() {
            const keySavedTime = localStorage.getItem("key_saved_time");
            const now = new Date().getTime();

            if (keySavedTime && (now - keySavedTime < EXPIRE_TIME)) {
                showSuccess();
            } else {
                localStorage.removeItem("key_saved_time");
                document.getElementById("lock-screen").style.display = "flex";
                document.getElementById("success-screen").style.display = "none";
            }
        };

        function verifyKey() {
            const userInput = document.getElementById("key-input").value.trim();
            const correctKey = generateDeviceKey();

            if (userInput === correctKey) {
                const now = new Date().getTime();
                localStorage.setItem("key_saved_time", now);
                
                document.getElementById("lock-screen").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("lock-screen").style.display = "none";
                    showSuccess();
                }, 300);
            } else {
                alert("Key thiết bị không chính xác hoặc đã hết hạn!");
            }
        }

        function showSuccess() {
            document.getElementById("lock-screen").style.display = "none";
            document.getElementById("success-screen").style.display = "flex";
        }
    </script>
</body>
                </html>
