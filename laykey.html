<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KT PING - Nhận Key</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
        }
        
        body { 
            background-color: #0d1117; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            background: rgba(21, 28, 46, 0.85); 
            border: 1px solid rgba(255, 77, 77, 0.2); 
            border-radius: 24px; 
            padding: 35px 25px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px); 
        }

        .icon-box { 
            width: 70px; 
            height: 70px; 
            background: rgba(255, 77, 77, 0.1); 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto 20px auto; 
        }

        .icon-box svg { 
            width: 35px; 
            height: 35px; 
            fill: #ff4d4d; 
        }

        h1 { 
            font-size: 24px; 
            font-weight: 800; 
            margin-bottom: 10px; 
            color: #ffffff; 
        }

        p { 
            font-size: 14px; 
            color: rgba(255, 255, 255, 0.6); 
            margin-bottom: 25px; 
            line-height: 1.5; 
        }

        /* Khung hiển thị mã Key */
        .key-display-box { 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px dashed rgba(255, 77, 77, 0.5); 
            border-radius: 12px; 
            padding: 18px; 
            font-size: 18px; 
            font-weight: 600; 
            color: #ff4d4d; 
            letter-spacing: 1px; 
            margin-bottom: 25px; 
            word-break: break-all; 
        }

        /* Nút Sao chép */
        .btn-copy { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #ff4d4d, #cc3b3b); 
            color: #ffffff; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.2); 
        }

        .btn-copy:active { 
            transform: scale(0.98); 
        }

        .note { 
            margin-top: 20px; 
            font-size: 12px; 
            color: rgba(255, 255, 255, 0.35); 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24">
                <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
            </svg>
        </div>

        <h1>VƯỢT LINK THÀNH CÔNG!</h1>
        <p>Chúc mừng bạn đã hoàn thành nhiệm vụ! Dưới đây là Key kích hoạt hệ thống của bạn (Hiệu lực trong 5 tiếng tiếp theo).</p>

        <div class="key-display-box" id="key-output">Đang tạo key thiết bị...</div>
        
        <button class="btn-copy" onclick="copyKey()">SAO CHÉP KEY</button>
        
        <div class="note">Mẹo: Bấm sao chép, sau đó quay lại trang chính dán vào là đăng nhập thành công!</div>
    </div>

    <script>
        // Hàm lấy dấu vân tay thiết bị (Không lo lệch trình duyệt hoặc mất cookie)
        function getDeviceFingerprint() {
            const navigator_info = window.navigator.userAgent + window.navigator.language + window.screen.colorDepth + window.screen.width + window.screen.height;
            let hash = 0;
            for (let i = 0; i < navigator_info.length; i++) {
                hash = (hash << 5) - hash + navigator_info.charCodeAt(i);
                hash |= 0;
            }
            return 'DEV' + Math.abs(hash).toString(36).toUpperCase();
        }

        // Tạo Key khớp 100% với thuật toán của trang Đăng Nhập
        function generateDeviceKey() {
            const fingerprint = getDeviceFingerprint();
            const today = new Date();
            const dateStr = today.getFullYear() + "" + (today.getMonth() + 1) + "" + today.getDate();
            const hourBlock = Math.floor(today.getHours() / 5); // Phân chia mốc 5 tiếng
            const seed = fingerprint + "_" + dateStr + "_" + hourBlock;
            
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = (hash << 5) - hash + seed.charCodeAt(i);
                hash |= 0;
            }
            const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
            let result = "";
            let absHash = Math.abs(hash);
            for (let i = 0; i < 9; i++) {
                absHash = (absHash * 16807) % 2147483647;
                result += chars[absHash % chars.length];
            }
            return `kietlac_${result}`;
        }

        // Hiển thị Key khi trang tải xong
        window.onload = function() {
            document.getElementById("key-output").innerText = generateDeviceKey();
        };

        // Sao chép nhanh Key vào khay nhớ tạm
        function copyKey() {
            const keyText = document.getElementById("key-output").innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                alert("Đã sao chép Key thành công!");
            }).catch(() => {
                const tempInput = document.createElement("input");
                tempInput.value = keyText;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                alert("Đã sao chép Key!");
            });
        }
    </script>
</body>
  </html>
